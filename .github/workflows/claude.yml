name: Claude Code

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  # 1) PR 自動レビュー (CodeRabbit と並行発火・必ず sticky comment で結果表示)
  auto-review:
    if: |
      github.event_name == 'pull_request' &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Claude Code Auto Review
        uses: anthropics/claude-code-action@939ae9c056ecf8a1a01409ddd1c4eadec5f8c77b # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 即時解決: sticky comment で必ず 1 つにまとめて投稿
          use_sticky_comment: "true"
          # 即時解決: 進捗 (Reviewing... → Completed) を可視化
          track_progress: "true"
          prompt: |
            このプルリクエストの diff を読み、以下の観点でレビューコメントを投稿してください。

            **重点観点**:
            - ロジックエラー / 潜在的バグ
            - セキュリティ脆弱性 (OWASP Top 10 - 関係する項目のみ)
            - パフォーマンス問題
            - 保守性 / 可読性
            - テストカバレッジ不足 (重要パスのみ)

            **指示**:
            - 日本語で簡潔に
            - CodeRabbit が既に指摘済の内容は省略可
            - nit レベルは省略・Major / Critical のみ
            - **必ず最後に総評の summary を 1 件は投稿すること** (use_sticky_comment 経由で sticky 化される)
            - 個別の inline comment 投稿に失敗した場合も、summary だけは必ず残すこと
            - 問題なければ「✅ Claude Code: レビュー観点で問題なし (確認した観点: ロジック/セキュリティ/パフォーマンス/保守性)」とコメント
          claude_args: --max-turns 15

  # 2) @claude メンション応答 (issue / PR コメント)
  mention:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') ||
         contains(github.event.issue.title, '@claude')) &&
        (github.event.issue.author_association == 'OWNER' ||
         github.event.issue.author_association == 'MEMBER' ||
         github.event.issue.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Claude Code Mention Handler
        uses: anthropics/claude-code-action@939ae9c056ecf8a1a01409ddd1c4eadec5f8c77b # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --max-turns 15

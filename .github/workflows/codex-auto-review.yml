name: Codex Auto Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  request-codex-review:
    if: >
      github.event.pull_request.draft == false &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Request Codex review
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = `<!-- codex-auto-review:${pr.head.sha} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const alreadyRequested = comments.some((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (alreadyRequested) {
              core.info(`Codex review already requested for ${pr.head.sha}.`);
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `@codex review\n\n${marker}\nTriggered automatically for commit ${pr.head.sha}.`,
            });